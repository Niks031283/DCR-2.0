<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b6e6e">
  <title>Login — Pharma CRM</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">💊</div>
      <h1>Pharma<span style="color:var(--primary)">CRM</span></h1>
      <p>Medical Representative Portal</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" class="form-control" id="password" placeholder="Enter password" required autocomplete="current-password" style="padding-right:44px">
          <button type="button" id="togglePwd" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-muted)" onclick="togglePassword()">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        Sign In
      </button>

      <div id="loginError" class="hidden" style="margin-top:14px;padding:10px 14px;background:var(--danger-light);color:var(--danger);border-radius:var(--radius-sm);font-size:13px;text-align:center"></div>
    </form>

    <div style="text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
      <p style="font-size:12px;color:var(--text-muted)">Demo Credentials</p>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="fillDemo('rahul@pharmacrm.com','password123')">MR: Rahul</button>
        <button class="btn btn-outline btn-sm" onclick="fillDemo('admin@pharmacrm.com','admin123')">Admin</button>
      </div>
    </div>

    <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:20px">
      © 2025 PharmaCRM • v1.0
    </p>
  </div>

  <script src="/app.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errDiv = document.getElementById('loginError');
      errDiv.classList.add('hidden');

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px"></div> Signing in...';

      try {
        const data = await apiCall('/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        Auth.set(data.token, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errDiv.textContent = err.message || 'Login failed. Please try again.';
        errDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });

    function fillDemo(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('togglePwd');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }
  </script>
</body>
</html>
